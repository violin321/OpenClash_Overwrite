name: Sync upstream and refresh custom artifacts

on:
  workflow_dispatch:
  schedule:
    - cron: '27 2 * * *'

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'

      - name: Sync upstream
        run: |
          git remote add upstream https://github.com/Giveupmoon/OpenClash_Overwrite.git || true
          git fetch upstream main
          git checkout main
          git merge --no-edit upstream/main || {
            echo 'Merge conflict while syncing upstream';
            git merge --abort || true;
            exit 1;
          }

      - name: Regenerate custom overwrite files
        run: |
          python3 scripts/generate-ipv6-conf.py
          ./scripts/generate-meta-overwrite.sh
          python3 scripts/update-readme-custom-section.py

      - name: Commit and push if changed
        run: |
          git add README.md \
            Overwrite/Overwrite-meta.conf \
            Overwrite/Overwrite-smart-bypass-ipv6.conf \
            Overwrite/Overwrite-smart-bypass-LGBM-ipv6.conf \
            scripts/generate-ipv6-conf.py \
            scripts/generate-meta-overwrite.sh \
            scripts/update-readme-custom-section.py \
            .github/workflows/sync-upstream-custom.yml
          for obsolete_workflow in \
            .github/workflows/sync-upstream-ipv6.yml \
            .github/workflows/sync-upstream-meta.yml; do
            if [ -e "$obsolete_workflow" ]; then
              git rm -f "$obsolete_workflow"
            fi
          done
          if git diff --cached --quiet; then
            echo 'No regenerated custom artifact changes to commit'
          else
            git commit -m 'Sync upstream and refresh custom artifacts'
          fi
          if git diff --quiet origin/main HEAD; then
            echo 'Local main already matches origin/main; nothing to push'
          else
            git push origin main
          fi
